name: "Selection Guide UI: Deploy to staging"

on:
  push:
    branches: [main]
    paths: ['packages/selection-guide-ui/**']
  workflow_dispatch:

env:
  NODE_VERSION: 22

defaults:
  run:
    working-directory: packages/selection-guide-ui

jobs:
  push_to_s3:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build
        run: |
          npm run build
          npm run build:site

      - name: AWS - authentication
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-central-1
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Upload to S3
        run: |
          aws s3 cp ./site s3://parcellab-cdn/playground/selection-guide-ui \
            --recursive \
            --cache-control max-age=86400

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3R5S2BJQI4RDS \
            --paths "/playground/selection-guide-ui/*"
