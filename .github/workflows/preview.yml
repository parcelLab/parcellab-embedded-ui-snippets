name: Deploy PR preview

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  deploy:
    if: contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Build site bundles
        run: |
          npm run build:site --workspace=packages/selection-guide-ui
          npm run build:site --workspace=packages/promise-ui

      - name: AWS - authentication
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: eu-central-1
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Upload selection-guide-ui preview
        run: |
          aws s3 cp packages/selection-guide-ui/site \
            s3://parcellab-cdn/playground/selection-guide-ui/pr-${{ github.event.pull_request.number }} \
            --recursive \
            --cache-control max-age=60

      - name: Upload promise-ui preview
        run: |
          aws s3 cp packages/promise-ui/site \
            s3://parcellab-cdn/playground/promise-ui/pr-${{ github.event.pull_request.number }} \
            --recursive \
            --cache-control max-age=60

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3R5S2BJQI4RDS \
            --paths \
              "/playground/selection-guide-ui/pr-${{ github.event.pull_request.number }}/*" \
              "/playground/promise-ui/pr-${{ github.event.pull_request.number }}/*"

      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const base = 'https://cdn.parcellab.com/playground';
            const body = [
              `### Preview deployed`,
              ``,
              `| Package | URL |`,
              `|---------|-----|`,
              `| selection-guide-ui | [${base}/selection-guide-ui/pr-${prNumber}/](${base}/selection-guide-ui/pr-${prNumber}/) |`,
              `| promise-ui | [${base}/promise-ui/pr-${prNumber}/](${base}/promise-ui/pr-${prNumber}/) |`,
            ].join('\n');

            // Find existing preview comment to update instead of spamming
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.startsWith('### Preview deployed'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
